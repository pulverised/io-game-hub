<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>IO Game Hub</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
    <h1>🎮 IO Game Hub</h1>
    <p>Play free multiplayer .io games</p>
</header>


<section class="controls">

    <input 
        id="search"
        type="text"
        placeholder="Search games..."
    >

    <div id="categories">

        <button data-category="All">
            All
        </button>

        <button data-category="Action">
            Action
        </button>

        <button data-category="Strategy">
            Strategy
        </button>

        <button data-category="Multiplayer">
            Multiplayer
        </button>

    </div>

</section>



<main id="game-grid"></main>



<script src="js/games.js"></script>
<script src="js/script.js"></script>

</body>
</html>
